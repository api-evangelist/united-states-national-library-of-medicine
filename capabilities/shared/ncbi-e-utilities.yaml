naftiko: "1.0.0-alpha1"

info:
  label: "NCBI E-Utilities API"
  description: >-
    The NCBI Entrez Programming Utilities providing programmatic access to
    PubMed, PMC, Gene, Nuccore, Protein, and 35+ other NCBI databases for
    search, retrieval, and linking of biomedical data.
  tags:
    - Biomedical
    - PubMed
    - Literature
    - Genomics
    - Federal Government
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      NCBI_API_KEY: NCBI_API_KEY

capability:
  consumes:
    - type: http
      namespace: eutils
      baseUri: https://eutils.ncbi.nlm.nih.gov/entrez/eutils
      description: "NCBI E-Utilities Entrez API"
      authentication:
        type: apikey
        key: api_key
        value: "{{NCBI_API_KEY}}"
        placement: query
      resources:
        - name: search
          path: /esearch.fcgi
          description: "Search Entrez databases"
          operations:
            - name: search-database
              method: GET
              description: "Search Entrez Database"
              inputParameters:
                - name: db
                  in: query
                  type: string
                  required: true
                  description: "Target database (pubmed, gene, nuccore, etc.)"
                - name: term
                  in: query
                  type: string
                  required: true
                  description: "Search query with optional field tags"
                - name: retmax
                  in: query
                  type: integer
                  required: false
                  description: "Max UIDs to return"
                - name: retstart
                  in: query
                  type: integer
                  required: false
                  description: "Starting index"
                - name: retmode
                  in: query
                  type: string
                  required: false
                  description: "Output format (json or xml)"
                - name: sort
                  in: query
                  type: string
                  required: false
                  description: "Sort order"
                - name: datetype
                  in: query
                  type: string
                  required: false
                  description: "Date field type"
                - name: mindate
                  in: query
                  type: string
                  required: false
                  description: "Minimum date"
                - name: maxdate
                  in: query
                  type: string
                  required: false
                  description: "Maximum date"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: fetch
          path: /efetch.fcgi
          description: "Retrieve full records from Entrez"
          operations:
            - name: fetch-records
              method: GET
              description: "Fetch Records"
              inputParameters:
                - name: db
                  in: query
                  type: string
                  required: true
                  description: "Target database"
                - name: id
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated UIDs"
                - name: rettype
                  in: query
                  type: string
                  required: false
                  description: "Record type (abstract, medline, fasta, etc.)"
                - name: retmode
                  in: query
                  type: string
                  required: false
                  description: "Output format (xml, text, json)"
              outputRawFormat: xml
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: summary
          path: /esummary.fcgi
          description: "Retrieve document summaries"
          operations:
            - name: get-summaries
              method: GET
              description: "Get Document Summaries"
              inputParameters:
                - name: db
                  in: query
                  type: string
                  required: true
                  description: "Target database"
                - name: id
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated UIDs"
                - name: retmode
                  in: query
                  type: string
                  required: false
                  description: "Output format"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: link
          path: /elink.fcgi
          description: "Find linked records across databases"
          operations:
            - name: get-linkages
              method: GET
              description: "Get Linked Records"
              inputParameters:
                - name: dbfrom
                  in: query
                  type: string
                  required: true
                  description: "Source database"
                - name: db
                  in: query
                  type: string
                  required: false
                  description: "Target database"
                - name: id
                  in: query
                  type: string
                  required: true
                  description: "Source UIDs"
                - name: linkname
                  in: query
                  type: string
                  required: false
                  description: "Named link"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: eutils-rest
      resources:
        - path: /v1/pubmed/search
          name: pubmed-search
          description: "Search PubMed literature"
          operations:
            - method: GET
              name: search-pubmed
              description: "Search PubMed articles"
              call: "eutils.search-database"
              with:
                db: pubmed
                term: "rest.query"
                retmax: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: eutils-mcp
      transport: http
      tools:
        - name: search-pubmed
          description: "Search PubMed biomedical literature database"
          hints:
            readOnly: true
            idempotent: true
          call: "eutils.search-database"
          with:
            db: pubmed
            term: "tools.query"
            retmax: "tools.max_results"
            sort: "tools.sort"
          outputParameters:
            - type: object
              mapping: "$."

        - name: fetch-pubmed-records
          description: "Retrieve full PubMed article records by PMID"
          hints:
            readOnly: true
            idempotent: true
          call: "eutils.fetch-records"
          with:
            db: pubmed
            id: "tools.pmids"
            rettype: "tools.format"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-pubmed-summaries
          description: "Get PubMed article document summaries by PMID"
          hints:
            readOnly: true
            idempotent: true
          call: "eutils.get-summaries"
          with:
            db: pubmed
            id: "tools.pmids"
          outputParameters:
            - type: object
              mapping: "$."

        - name: search-entrez-database
          description: "Search any NCBI Entrez database (gene, nuccore, protein, snp, etc.)"
          hints:
            readOnly: true
            idempotent: true
          call: "eutils.search-database"
          with:
            db: "tools.database"
            term: "tools.query"
            retmax: "tools.max_results"
          outputParameters:
            - type: object
              mapping: "$."
