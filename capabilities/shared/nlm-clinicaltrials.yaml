naftiko: "1.0.0-alpha1"

info:
  label: "ClinicalTrials.gov API"
  description: >-
    Programmatic access to clinical trial data registered on ClinicalTrials.gov,
    including study protocols, eligibility criteria, locations, sponsors, and
    results for hundreds of thousands of trials worldwide.
  tags:
    - Clinical Trials
    - Healthcare
    - Research
    - Federal Government
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys: {}

capability:
  consumes:
    - type: http
      namespace: clinicaltrials
      baseUri: https://clinicaltrials.gov/api/v2
      description: "ClinicalTrials.gov REST API v2 - no authentication required"
      resources:
        - name: studies
          path: /studies
          description: "Search and retrieve clinical trial studies"
          operations:
            - name: search-studies
              method: GET
              description: "Search Clinical Trial Studies"
              inputParameters:
                - name: query.term
                  in: query
                  type: string
                  required: false
                  description: "Full-text search query"
                - name: query.cond
                  in: query
                  type: string
                  required: false
                  description: "Condition or disease filter"
                - name: query.intr
                  in: query
                  type: string
                  required: false
                  description: "Intervention or treatment filter"
                - name: query.spons
                  in: query
                  type: string
                  required: false
                  description: "Sponsor filter"
                - name: filter.overallStatus
                  in: query
                  type: string
                  required: false
                  description: "Overall status filter"
                - name: filter.phase
                  in: query
                  type: string
                  required: false
                  description: "Clinical trial phase filter"
                - name: filter.studyType
                  in: query
                  type: string
                  required: false
                  description: "Study type filter"
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Results per page"
                - name: pageToken
                  in: query
                  type: string
                  required: false
                  description: "Next page token"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: study-by-id
          path: /studies/{nctId}
          description: "Retrieve a specific clinical trial by NCT ID"
          operations:
            - name: get-study
              method: GET
              description: "Get Study by NCT ID"
              inputParameters:
                - name: nctId
                  in: path
                  type: string
                  required: true
                  description: "ClinicalTrials.gov NCT identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: dataset-size
          path: /stats/size
          description: "Get total count of studies matching criteria"
          operations:
            - name: get-dataset-size
              method: GET
              description: "Get Dataset Size"
              inputParameters:
                - name: query.cond
                  in: query
                  type: string
                  required: false
                  description: "Condition filter for count"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: clinicaltrials-rest
      resources:
        - path: /v1/trials/search
          name: trial-search
          description: "Search clinical trials"
          operations:
            - method: GET
              name: search-trials
              description: "Search ClinicalTrials.gov"
              call: "clinicaltrials.search-studies"
              with:
                query.cond: "rest.condition"
                query.intr: "rest.intervention"
                filter.overallStatus: "rest.status"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: clinicaltrials-mcp
      transport: http
      tools:
        - name: search-clinical-trials
          description: "Search ClinicalTrials.gov for clinical trials by condition, intervention, or sponsor"
          hints:
            readOnly: true
            idempotent: true
          call: "clinicaltrials.search-studies"
          with:
            query.cond: "tools.condition"
            query.intr: "tools.intervention"
            query.spons: "tools.sponsor"
            filter.overallStatus: "tools.status"
            filter.phase: "tools.phase"
            pageSize: "tools.page_size"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-clinical-trial
          description: "Retrieve complete details for a clinical trial by its NCT identifier"
          hints:
            readOnly: true
            idempotent: true
          call: "clinicaltrials.get-study"
          with:
            nctId: "tools.nct_id"
          outputParameters:
            - type: object
              mapping: "$."
