  description: The NCBI Datasets REST API v2 provides programmatic access to biological data including genome assemblies,
    gene records, and protein sequences across organisms. Returns data packages containing sequences, annotations, metadata,
    and related data. An OpenAPI 3.0 specification is available on GitHub at github.com/ncbi/datasets. API keys are optional
    but increase rate limits.
