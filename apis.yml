  description: The NCBI E-Utilities (Entrez Programming Utilities) are the public API to the NCBI Entrez system providing
    access to all Entrez databases including PubMed (biomedical literature), PMC (full-text articles), Gene, Nuccore (nucleotide
    sequences), Protein, and 39 other databases. Supports search, retrieval, linking, and posting operations. API keys from
    ncbi.nlm.nih.gov/account/ increase the rate limit from 3 to 10 requests/second.
