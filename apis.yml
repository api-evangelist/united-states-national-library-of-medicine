  description: The NCBI BLAST URL API allows developers to submit BLAST (Basic Local Alignment Search Tool) sequence searches
    for processing at NCBI using HTTPS. Supports nucleotide and protein sequence searches against NCBI databases. The API
    can check the status of submitted searches and retrieve results in multiple formats including XML, JSON, text, and ASN.1.
