specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: United States National Library of Medicine
providerId: united-states-national-library-of-medicine
publisherName: United States National Library of Medicine
serviceCategory: API
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Federal Government
  - Biomedical Research
  - Healthcare
  - Genomics
  - Literature
  - FinOps
  - Cost Management
  - FOCUS
description: FinOps framework definition for the United States National Library of Medicine API surface.
  Provides a FOCUS-aligned mapping for cost allocation, usage measurement, and unit-economics reporting
  across the provider's APIs.
principles:
  - name: Visibility
    description: Make API consumption costs visible to engineering, product, and finance teams in near
      real-time.
  - name: Allocation
    description: Tag every chargeable API call with the consuming team, environment, application, and
      feature so cost can be allocated.
  - name: Optimization
    description: Continuously evaluate request patterns, caching, batching, and tier selection to reduce
      cost per useful unit of work.
  - name: Accountability
    description: Establish budget owners and chargeback or showback flows for each consuming team.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Cloud Sustainability
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
      - Invoicing and Chargeback
      - Onboarding Workloads
      - Intersecting Disciplines
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: United States National Library of Medicine
  ServiceCategory: Developer Tools / API
  ProviderName: United States National Library of Medicine
  PublisherName: United States National Library of Medicine
  InvoiceIssuerName: United States National Library of Medicine
  PricingCategory: Usage-Based
  PricingUnit: request
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: api_requests
    description: Count of billable API requests
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
      - region
      - consumer
  - name: data_egress
    description: Bytes returned over the network in API responses
    unit: GB
    aggregation: sum
    dimensions:
      - api
      - region
      - consumer
  - name: compute_seconds
    description: Server-side compute consumed by the request, where applicable
    unit: second
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
apis:
  - name: NCBI E-Utilities API
    baseURL: https://eutils.ncbi.nlm.nih.gov/entrez/eutils
    tags:
      - Biomedical
      - PubMed
      - Literature
      - Genomics
      - Federal Government
    serviceName: NCBI E-Utilities API
    serviceCategory: API
  - name: NCBI Datasets REST API
    baseURL: https://api.ncbi.nlm.nih.gov/datasets/v2
    tags:
      - Genomics
      - Biological Sequences
      - Gene Data
      - Federal Government
    serviceName: NCBI Datasets REST API
    serviceCategory: API
  - name: NCBI BLAST URL API
    baseURL: https://blast.ncbi.nlm.nih.gov/blast/Blast.cgi
    tags:
      - Genomics
      - Sequence Alignment
      - Bioinformatics
      - Federal Government
    serviceName: NCBI BLAST URL API
    serviceCategory: API
  - name: ClinicalTrials.gov API
    baseURL: https://clinicaltrials.gov/api/v2
    tags:
      - Clinical Trials
      - Healthcare
      - Research
      - Federal Government
    serviceName: ClinicalTrials.gov API
    serviceCategory: API
unitEconomics:
  - name: Cost per 1K Requests
    metric: billed_cost / (api_requests / 1000)
    target: TBD
  - name: Cost per Active Consumer
    metric: billed_cost / active_consumers
    target: TBD
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
